<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" font-family="'Segoe UI', 'PingFang SC', sans-serif">

  <defs>
    <filter id="card" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.07"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="none" stroke="#4b87c7" stroke-width="1.2" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-dash" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="none" stroke="#9ca3af" stroke-width="1" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1080" height="620" fill="#f8fafc" rx="16"/>

  <!-- Status badge -->
  <text x="60" y="42" font-size="12" font-weight="700" fill="#16a34a" letter-spacing="2">COMPLETED</text>

  <!-- Title -->
  <text x="60" y="80" font-size="32" font-weight="800" fill="#1e293b">OAuth 2.0 Proxy Service</text>

  <!-- ===== PROVIDER CIRCLES (left side) ===== -->

  <!-- Twitter/X -->
  <circle cx="200" cy="240" r="42" fill="#e8f4fd" stroke="#c5dff0" stroke-width="1.5" filter="url(#card)"/>
  <circle cx="200" cy="240" r="28" fill="#1da1f2"/>
  <text x="200" y="246" text-anchor="middle" font-size="18" fill="white" font-weight="700">X</text>
  <text x="200" y="300" text-anchor="middle" font-size="12" fill="#64748b" font-weight="600">Twitter / X</text>

  <!-- Facebook -->
  <circle cx="160" cy="380" r="42" fill="#e8f0fe" stroke="#c5d5f0" stroke-width="1.5" filter="url(#card)"/>
  <circle cx="160" cy="380" r="28" fill="#1877f2"/>
  <text x="160" y="386" text-anchor="middle" font-size="18" fill="white" font-weight="700">f</text>
  <text x="160" y="440" text-anchor="middle" font-size="12" fill="#64748b" font-weight="600">Facebook</text>

  <!-- TikTok -->
  <circle cx="240" cy="500" r="42" fill="#f1f1f1" stroke="#d4d4d4" stroke-width="1.5" filter="url(#card)"/>
  <circle cx="240" cy="500" r="28" fill="#010101"/>
  <!-- TikTok music note simplified -->
  <text x="240" y="506" text-anchor="middle" font-size="16" fill="white" font-weight="700">TT</text>
  <text x="240" y="558" text-anchor="middle" font-size="12" fill="#64748b" font-weight="600">TikTok</text>

  <!-- More... (pluggable) -->
  <circle cx="360" cy="200" r="36" fill="#f3e8ff" stroke="#d8b4fe" stroke-width="1.5" filter="url(#card)"/>
  <!-- Plug icon -->
  <line x1="350" y1="190" x2="350" y2="205" stroke="#9333ea" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="370" y1="190" x2="370" y2="205" stroke="#9333ea" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="344" y="205" width="32" height="8" rx="4" fill="#9333ea"/>
  <text x="360" y="252" text-anchor="middle" font-size="12" fill="#64748b" font-weight="600">More...</text>

  <!-- ===== DASHED LINES from providers to NyxID ===== -->
  <line x1="242" y1="240" x2="450" y2="340" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="202" y1="380" x2="450" y2="360" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="280" y1="490" x2="460" y2="380" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="390" y1="210" x2="460" y2="320" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ===== NYXID CENTER HUB ===== -->
  <circle cx="540" cy="350" r="80" fill="#d4e8f8" stroke="#a3cae9" stroke-width="2" filter="url(#card)"/>
  <circle cx="540" cy="350" r="60" fill="#4b87c7" filter="url(#glow)"/>
  <text x="540" y="342" text-anchor="middle" font-size="22" font-weight="800" fill="white">NyxID</text>
  <text x="540" y="365" text-anchor="middle" font-size="11" fill="#e0effa">OAuth Hub</text>

  <!-- ===== ARROW: NyxID → User ===== -->
  <line x1="620" y1="350" x2="770" y2="350" stroke="#4b87c7" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- ===== USER CARD (right side) ===== -->
  <rect x="790" y="280" width="220" height="140" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#card)"/>
  <rect x="790" y="280" width="220" height="6" rx="3" fill="#16a34a"/>

  <!-- User icon -->
  <circle cx="900" cy="330" r="18" fill="none" stroke="#64748b" stroke-width="1.8"/>
  <circle cx="900" cy="324" r="7" fill="none" stroke="#64748b" stroke-width="1.8"/>
  <path d="M882,348 C882,338 918,338 918,348" fill="none" stroke="#64748b" stroke-width="1.8"/>

  <text x="900" y="370" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">User</text>
  <text x="900" y="390" text-anchor="middle" font-size="11" fill="#64748b">Triggers action</text>
  <text x="900" y="405" text-anchor="middle" font-size="11" fill="#64748b">via NyxID</text>

  <!-- ===== BOTTOM CALLOUT ===== -->
  <rect x="120" y="568" width="840" height="38" rx="10" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="540" y="593" text-anchor="middle" font-size="13" fill="#475569" font-style="italic">OAuth 2.0 standard — new providers are easily pluggable with minimal effort</text>

</svg>