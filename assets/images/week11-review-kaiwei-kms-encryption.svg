<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 560" font-family="'Segoe UI', 'PingFang SC', sans-serif">

  <defs>
    <filter id="card" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="12" markerHeight="8" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="none" stroke="#4b87c7" stroke-width="1.4" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1080" height="560" fill="#f8fafc" rx="16"/>

  <!-- Status badge -->
  <text x="60" y="42" font-size="12" font-weight="700" fill="#d97706" letter-spacing="2">BONUS</text>

  <!-- Title -->
  <text x="60" y="82" font-size="32" font-weight="800" fill="#1e293b">KMS Encryption with Rotatable Secrets</text>

  <!-- ===== BEFORE CARD ===== -->
  <rect x="80" y="130" width="400" height="280" rx="16" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#card)"/>

  <!-- Before header bar -->
  <rect x="80" y="130" width="400" height="44" rx="16" fill="#9ca3af"/>
  <rect x="80" y="150" width="400" height="24" fill="#9ca3af"/>
  <text x="280" y="158" text-anchor="middle" font-size="14" font-weight="700" fill="white" letter-spacing="1.5">BEFORE</text>

  <!-- Key icon -->
  <circle cx="280" cy="240" r="36" fill="#fef3e2"/>
  <!-- Key shape -->
  <circle cx="272" cy="232" r="12" fill="none" stroke="#d97706" stroke-width="2.5"/>
  <line x1="284" y1="232" x2="310" y2="232" stroke="#d97706" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="302" y1="232" x2="302" y2="240" stroke="#d97706" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="310" y1="232" x2="310" y2="240" stroke="#d97706" stroke-width="2.5" stroke-linecap="round"/>

  <text x="280" y="300" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Static Keys</text>
  <text x="280" y="326" text-anchor="middle" font-size="12" fill="#64748b">Keys stored locally</text>
  <text x="280" y="344" text-anchor="middle" font-size="12" fill="#64748b">No rotation capability</text>
  <text x="280" y="362" text-anchor="middle" font-size="12" fill="#64748b">Single point of failure</text>

  <!-- Arrow between cards -->
  <line x1="500" y1="270" x2="570" y2="270" stroke="#4b87c7" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- ===== AFTER CARD ===== -->
  <rect x="600" y="130" width="400" height="280" rx="16" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#card)"/>

  <!-- After header bar -->
  <rect x="600" y="130" width="400" height="44" rx="16" fill="#16a34a"/>
  <rect x="600" y="150" width="400" height="24" fill="#16a34a"/>
  <text x="800" y="158" text-anchor="middle" font-size="14" font-weight="700" fill="white" letter-spacing="1.5">AFTER</text>

  <!-- GCP cloud icon -->
  <circle cx="750" cy="232" r="28" fill="#e0effa"/>
  <circle cx="744" cy="228" r="10" fill="none" stroke="#4285f4" stroke-width="2"/>
  <circle cx="758" cy="224" r="8" fill="none" stroke="#4285f4" stroke-width="2"/>
  <rect x="736" y="230" width="30" height="10" rx="5" fill="#e0effa" stroke="#4285f4" stroke-width="2"/>
  <text x="750" y="272" text-anchor="middle" font-size="10" fill="#4285f4" font-weight="600">GCP</text>

  <!-- AWS cloud icon -->
  <circle cx="850" cy="232" r="28" fill="#fef3e2"/>
  <circle cx="844" cy="228" r="10" fill="none" stroke="#ff9900" stroke-width="2"/>
  <circle cx="858" cy="224" r="8" fill="none" stroke="#ff9900" stroke-width="2"/>
  <rect x="836" y="230" width="30" height="10" rx="5" fill="#fef3e2" stroke="#ff9900" stroke-width="2"/>
  <text x="850" y="272" text-anchor="middle" font-size="10" fill="#ff9900" font-weight="600">AWS</text>

  <text x="800" y="306" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Cloud KMS</text>
  <text x="800" y="332" text-anchor="middle" font-size="12" fill="#64748b">Enterprise-grade key management</text>
  <text x="800" y="350" text-anchor="middle" font-size="12" fill="#64748b">Automatic key rotation</text>
  <text x="800" y="368" text-anchor="middle" font-size="12" fill="#64748b">GCP + AWS supported</text>

  <!-- ===== BOTTOM CALLOUT ===== -->
  <rect x="120" y="460" width="840" height="48" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Rotate icon -->
  <path d="M152,484 A12,12 0 1,1 164,472" fill="none" stroke="#d97706" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="164,468 164,476 172,472" fill="#d97706"/>
  <path d="M176,480 A12,12 0 1,1 164,492" fill="none" stroke="#4b87c7" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="164,496 164,488 156,492" fill="#4b87c7"/>

  <text x="192" y="490" font-size="13" fill="#475569" font-weight="500">Rotatable secrets eliminate static key risks — enterprise-grade security for all users</text>

</svg>