<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" font-family="'Segoe UI', 'PingFang SC', sans-serif">

  <defs>
    <filter id="card" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <linearGradient id="progGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 8 6" refX="8" refY="3" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0.5 L7,3 L0,5.5" fill="none" stroke="#94a3b8" stroke-width="1" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ===== SISYPHUS SECTION ===== -->
  <rect x="30" y="20" width="500" height="580" rx="18" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#card)"/>
  <rect x="30" y="20" width="500" height="50" rx="18" fill="#0f0e1a"/>
  <rect x="30" y="52" width="500" height="18" fill="#0f0e1a"/>
  <text x="280" y="52" text-anchor="middle" font-size="16" font-weight="700" fill="#e0e7ff">Sisyphus — Knowledge Pipeline</text>

  <!-- Upload Pipeline -->
  <text x="60" y="102" font-size="13" font-weight="700" fill="#334155">Upload Pipeline</text>
  <rect x="56" y="108" width="56" height="3" rx="1.5" fill="url(#progGrad)"/>

  <!-- Pipeline flow: 3 stages -->
  <rect x="60" y="124" width="130" height="56" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.2"/>
  <text x="125" y="149" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">TeX Upload</text>
  <text x="125" y="168" text-anchor="middle" font-size="16" fill="#22c55e">&#x2713;</text>

  <path d="M190,152 L218,152" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <rect x="228" y="124" width="130" height="56" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="293" y="149" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">AI Purification</text>
  <text x="293" y="168" text-anchor="middle" font-size="16" fill="#22c55e">&#x2713;</text>

  <path d="M358,152 L386,152" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <rect x="396" y="124" width="112" height="56" rx="10" fill="#0f0e1a" stroke="#6366f1" stroke-width="1.2"/>
  <text x="452" y="147" text-anchor="middle" font-size="11" font-weight="600" fill="#c7d2fe">Maker</text>
  <text x="452" y="163" text-anchor="middle" font-size="11" font-weight="600" fill="#c7d2fe">Verification</text>

  <!-- Maker verification progress -->
  <rect x="60" y="200" width="448" height="70" rx="12" fill="#fafbff" stroke="#e0e7ff" stroke-width="1"/>
  <text x="80" y="224" font-size="11" font-weight="600" fill="#4338ca">Maker Verification — In Progress</text>
  <text x="80" y="244" font-size="10" fill="#64748b">Processing 38,796 purified items → verified nodes/edges</text>
  <!-- Progress bar -->
  <rect x="80" y="254" width="408" height="6" rx="3" fill="#e0e7ff"/>
  <rect x="80" y="254" width="408" height="6" rx="3" fill="url(#progGrad)">
    <animate attributeName="width" from="200" to="408" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Research Pipeline -->
  <text x="60" y="302" font-size="13" font-weight="700" fill="#334155">Research Pipeline</text>
  <rect x="56" y="308" width="56" height="3" rx="1.5" fill="url(#progGrad)"/>

  <rect x="60" y="324" width="448" height="80" rx="12" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2"/>
  <text x="284" y="354" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">Research loop now uses verified data only</text>
  <text x="284" y="378" text-anchor="middle" font-size="10" fill="#15803d">Integrated with maker verification — only black (verified) nodes</text>
  <text x="284" y="393" text-anchor="middle" font-size="10" fill="#15803d">feed into research sessions</text>

  <!-- Node pipeline visual -->
  <text x="60" y="438" font-size="13" font-weight="700" fill="#334155">Node Lifecycle</text>
  <rect x="56" y="444" width="56" height="3" rx="1.5" fill="url(#progGrad)"/>

  <rect x="80" y="464" width="100" height="36" rx="18" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.2"/>
  <text x="130" y="487" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">Red</text>
  <path d="M180,482 L210,482" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <rect x="220" y="464" width="100" height="36" rx="18" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="270" y="487" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">Blue</text>
  <path d="M320,482 L350,482" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <rect x="360" y="464" width="120" height="36" rx="18" fill="#0f0e1a" stroke="#6366f1" stroke-width="1.2"/>
  <text x="420" y="487" text-anchor="middle" font-size="11" font-weight="600" fill="#c7d2fe">Black &#x2713;</text>

  <text x="130" y="516" text-anchor="middle" font-size="9" fill="#a1a1aa">Raw</text>
  <text x="270" y="516" text-anchor="middle" font-size="9" fill="#a1a1aa">Purified</text>
  <text x="420" y="516" text-anchor="middle" font-size="9" fill="#a1a1aa">Verified</text>

  <!-- Stat highlight -->
  <rect x="60" y="540" width="448" height="44" rx="10" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1"/>
  <text x="284" y="567" text-anchor="middle" font-size="13" font-weight="700" fill="#4338ca">38,796 items being verified → knowledge graph</text>

  <!-- ===== ORNN SECTION ===== -->
  <rect x="550" y="20" width="500" height="580" rx="18" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#card)"/>
  <rect x="550" y="20" width="500" height="50" rx="18" fill="#059669"/>
  <rect x="550" y="52" width="500" height="18" fill="#059669"/>
  <text x="800" y="52" text-anchor="middle" font-size="16" font-weight="700" fill="white">Ornn Platform — v0.1.0 Alpha</text>

  <!-- Release badge -->
  <rect x="580" y="92" width="440" height="50" rx="12" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2"/>
  <text x="800" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">v0.1.0 Alpha Released — Core Features Live</text>
  <text x="800" y="132" text-anchor="middle" font-size="10" fill="#15803d">Platform ready for end users on staging</text>

  <!-- Integrations -->
  <text x="580" y="172" font-size="13" font-weight="700" fill="#334155">Platform Integrations</text>
  <rect x="576" y="178" width="56" height="3" rx="1.5" fill="url(#greenGrad)"/>

  <!-- NyxID -->
  <rect x="580" y="196" width="440" height="60" rx="12" fill="white" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="580" y="196" width="6" height="60" rx="3" fill="#7c3aed"/>
  <text x="610" y="222" font-size="12" font-weight="600" fill="#6d28d9">NyxID OAuth</text>
  <text x="610" y="242" font-size="10" fill="#8b5cf6">Login · Logout · Register — e2e on staging</text>

  <!-- chrono-storage -->
  <rect x="580" y="270" width="440" height="60" rx="12" fill="white" stroke="#60a5fa" stroke-width="1.5"/>
  <rect x="580" y="270" width="6" height="60" rx="3" fill="#3b82f6"/>
  <text x="610" y="296" font-size="12" font-weight="600" fill="#2563eb">chrono-storage</text>
  <text x="610" y="316" font-size="10" fill="#60a5fa">Skill package storage on AWS S3</text>

  <!-- chrono-sandbox -->
  <rect x="580" y="344" width="440" height="60" rx="12" fill="white" stroke="#fb923c" stroke-width="1.5"/>
  <rect x="580" y="344" width="6" height="60" rx="3" fill="#f97316"/>
  <text x="610" y="370" font-size="12" font-weight="600" fill="#ea580c">chrono-sandbox</text>
  <text x="610" y="390" font-size="10" fill="#fb923c">Script execution for skill workflows</text>

  <!-- Deployments -->
  <text x="580" y="436" font-size="13" font-weight="700" fill="#334155">Deployments</text>
  <rect x="576" y="442" width="56" height="3" rx="1.5" fill="url(#greenGrad)"/>

  <rect x="580" y="460" width="136" height="44" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="648" y="478" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Ornn</text>
  <text x="648" y="494" text-anchor="middle" font-size="16" fill="#22c55e">&#x2713;</text>

  <rect x="732" y="460" width="136" height="44" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="800" y="478" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">chrono-storage</text>
  <text x="800" y="494" text-anchor="middle" font-size="16" fill="#22c55e">&#x2713;</text>

  <rect x="884" y="460" width="136" height="44" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="952" y="478" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">chrono-sandbox</text>
  <text x="952" y="494" text-anchor="middle" font-size="16" fill="#22c55e">&#x2713;</text>

  <!-- Ready status -->
  <rect x="580" y="524" width="440" height="60" rx="12" fill="#0f0e1a" stroke="#059669" stroke-width="1.5"/>
  <text x="800" y="552" text-anchor="middle" font-size="13" font-weight="700" fill="#6ee7b7">Staging Ready — NyxID Integration Complete</text>
  <text x="800" y="572" text-anchor="middle" font-size="10" fill="#34d399">End-to-end platform available for users</text>

</svg>