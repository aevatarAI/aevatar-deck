<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 520" font-family="'Segoe UI', 'PingFang SC', sans-serif">

  <defs>
    <marker id="arr" viewBox="0 0 8 6" refX="8" refY="3" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0.5 L7,3 L0,5.5" fill="none" stroke="#a0a0a0" stroke-width="1" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-black" viewBox="0 0 8 6" refX="8" refY="3" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0.5 L7,3 L0,5.5" fill="none" stroke="#1e1b4b" stroke-width="1.2" stroke-linejoin="round"/>
    </marker>
    <filter id="card" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <linearGradient id="blackGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="540" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#334155">Maker Verification Pipeline — Red → Blue → Black</text>

  <!-- ===== RED CARD ===== -->
  <rect x="30" y="60" width="260" height="200" rx="14" fill="white" stroke="#fca5a5" stroke-width="1.5" filter="url(#card)"/>
  <rect x="30" y="60" width="6" height="200" rx="3" fill="#ef4444"/>
  <text x="160" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#dc2626">Raw Nodes</text>
  <text x="160" y="112" text-anchor="middle" font-size="10" fill="#f87171">TeX upload · mixed content</text>
  <line x1="50" y1="124" x2="272" y2="124" stroke="#fee2e2" stroke-width="1"/>
  <text x="60" y="148" font-size="10" fill="#991b1b">• Unverified TeX content</text>
  <text x="60" y="168" font-size="10" fill="#991b1b">• Mixed languages</text>
  <text x="60" y="188" font-size="10" fill="#991b1b">• Multi-concept blocks</text>
  <text x="60" y="208" font-size="10" fill="#991b1b">• No type enforcement</text>
  <rect x="50" y="228" width="220" height="20" rx="10" fill="#fef2f2"/>
  <text x="160" y="242" text-anchor="middle" font-size="9" fill="#ef4444" font-weight="600">Status: raw / unprocessed</text>

  <!-- Arrow: Red → Blue -->
  <path d="M290,160 L380,160" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="5,4" fill="none" marker-end="url(#arr)"/>
  <rect x="310" y="130" width="52" height="40" rx="10" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="336" y="148" text-anchor="middle" font-size="9" fill="#64748b" font-weight="600">AI</text>
  <text x="336" y="162" text-anchor="middle" font-size="9" fill="#64748b" font-weight="600">Purify</text>

  <!-- ===== BLUE CARD ===== -->
  <rect x="390" y="60" width="260" height="200" rx="14" fill="white" stroke="#93c5fd" stroke-width="1.5" filter="url(#card)"/>
  <rect x="390" y="60" width="6" height="200" rx="3" fill="#3b82f6"/>
  <text x="520" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#2563eb">Purified Nodes</text>
  <text x="520" y="112" text-anchor="middle" font-size="10" fill="#60a5fa">AI-cleaned · strongly typed</text>
  <line x1="410" y1="124" x2="632" y2="124" stroke="#dbeafe" stroke-width="1"/>
  <text x="420" y="148" font-size="10" fill="#1e40af">• Atomic, typed nodes</text>
  <text x="420" y="168" font-size="10" fill="#1e40af">• English abstracts</text>
  <text x="420" y="188" font-size="10" fill="#1e40af">• Clean body content</text>
  <text x="420" y="208" font-size="10" fill="#1e40af">• Graph edges generated</text>
  <rect x="410" y="228" width="220" height="20" rx="10" fill="#eff6ff"/>
  <text x="520" y="242" text-anchor="middle" font-size="9" fill="#3b82f6" font-weight="600">Status: purified / unverified</text>

  <!-- Arrow: Blue → Black -->
  <path d="M650,160 L740,160" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="5,4" fill="none" marker-end="url(#arr)"/>
  <rect x="664" y="124" width="64" height="52" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="696" y="143" text-anchor="middle" font-size="9" fill="#4338ca" font-weight="600">Maker</text>
  <text x="696" y="157" text-anchor="middle" font-size="9" fill="#4338ca" font-weight="600">Verify</text>
  <text x="696" y="170" text-anchor="middle" font-size="8" fill="#6366f1">+ TeX ↑</text>

  <!-- ===== BLACK CARD ===== -->
  <rect x="750" y="60" width="300" height="200" rx="14" fill="#0f0e1a" stroke="#4338ca" stroke-width="1.5" filter="url(#card)"/>
  <rect x="750" y="60" width="6" height="200" rx="3" fill="url(#blackGrad)"/>
  <text x="900" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#e0e7ff">Verified Nodes ✓</text>
  <text x="900" y="112" text-anchor="middle" font-size="10" fill="#818cf8">maker-verified · production-ready</text>
  <line x1="770" y1="124" x2="1032" y2="124" stroke="#312e81" stroke-width="1"/>
  <text x="780" y="148" font-size="10" fill="#a5b4fc">• Maker-verified content</text>
  <text x="780" y="168" font-size="10" fill="#a5b4fc">• TeX upload confirmed</text>
  <text x="780" y="188" font-size="10" fill="#a5b4fc">• Trusted for research loop</text>
  <text x="780" y="208" font-size="10" fill="#a5b4fc">• Zero blue-node leakage</text>
  <rect x="770" y="228" width="260" height="20" rx="10" fill="#1e1b4b"/>
  <text x="900" y="242" text-anchor="middle" font-size="9" fill="#818cf8" font-weight="600">Status: verified / research-ready</text>

  <!-- ===== BOTTOM: Research Loop ===== -->
  <rect x="30" y="310" width="1020" height="180" rx="16" fill="#fafbff" stroke="#c7d2fe" stroke-width="1.5" stroke-dasharray="6,3" filter="url(#card)"/>
  <text x="540" y="340" text-anchor="middle" font-size="14" font-weight="700" fill="#4338ca">Research Loop — Now Filters on Black (Verified) Nodes Only</text>

  <!-- Old flow (crossed out) -->
  <rect x="60" y="360" width="440" height="100" rx="12" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="280" y="385" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">Before (Week 10)</text>
  <text x="280" y="410" text-anchor="middle" font-size="10" fill="#991b1b">Research loop loaded blue (purified) nodes as context</text>
  <text x="280" y="430" text-anchor="middle" font-size="10" fill="#991b1b">→ Unverified data could enter research pipeline</text>
  <line x1="80" y1="415" x2="480" y2="415" stroke="#ef4444" stroke-width="1.5" opacity="0.5"/>

  <!-- New flow -->
  <rect x="540" y="360" width="480" height="100" rx="12" fill="#0f0e1a" stroke="#4338ca" stroke-width="1.5"/>
  <text x="780" y="385" text-anchor="middle" font-size="11" font-weight="600" fill="#c7d2fe">Now (Week 11)</text>
  <text x="780" y="410" text-anchor="middle" font-size="10" fill="#a5b4fc">Research loop filters exclusively on black (verified) nodes</text>
  <text x="780" y="430" text-anchor="middle" font-size="10" fill="#a5b4fc">→ Only maker-verified data enters research pipeline</text>

  <!-- Arrow between old/new -->
  <path d="M500,410 L540,410" stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#arr-black)"/>

</svg>