  <!-- ===== BLUE CARDS ===== -->

  <!-- definition: y=20..150 -->
  <rect x="450" y="20" width="380" height="130" rx="14" fill="white" stroke="#93c5fd" stroke-width="1.5" filter="url(#card)"/>
  <rect x="450" y="20" width="6" height="130" rx="3" fill="#3b82f6"/>
  <text x="640" y="48" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">definition</text>
  <text x="468" y="72" font-size="9.5" fill="#94a3b8">abstract</text>
  <text x="530" y="72" font-size="9" fill="#1e40af">"Defines the induced output distribution for</text>
  <text x="530" y="85" font-size="9" fill="#1e40af">bin-fold under uniform microstate input."</text>
  <text x="468" y="110" font-size="9.5" fill="#94a3b8">body</text>
  <text x="530" y="110" font-size="9" fill="#1e40af">"Define pi_m(w) := d_m^bin(w) / 2^m, ..."</text>
  <text x="468" y="140" font-size="7.5" fill="#cbd5e1">e7ebb4fb-bfb1-47d4-9ee8-bb54f34b0b82</text>

  <!-- theorem: y=220..360 -->
  <rect x="450" y="220" width="380" height="140" rx="14" fill="white" stroke="#93c5fd" stroke-width="1.5" filter="url(#card)"/>
  <rect x="450" y="220" width="6" height="140" rx="3" fill="#3b82f6"/>
  <text x="640" y="248" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">theorem</text>
  <text x="468" y="274" font-size="9.5" fill="#94a3b8">abstract</text>
  <text x="530" y="274" font-size="9" fill="#1e40af">"The q-moment of the bin-fold output obeys</text>
  <text x="530" y="287" font-size="9" fill="#1e40af">an affine Renyi mass-spectrum law in m."</text>
  <text x="468" y="314" font-size="9.5" fill="#94a3b8">body</text>
  <text x="530" y="314" font-size="9" fill="#1e40af">"For every q>0, exists K_q>0 such that</text>
  <text x="530" y="327" font-size="9" fill="#1e40af">sum pi_m(w)^q = K_q * phi^((1-q)m) ..."</text>
  <text x="468" y="352" font-size="7.5" fill="#cbd5e1">6ebe4c76-1053-4d03-b813-e62862939458</text>

  <!-- corollary: y=430..550 -->
  <rect x="450" y="430" width="380" height="120" rx="14" fill="white" stroke="#93c5fd" stroke-width="1.5" filter="url(#card)"/>
  <rect x="450" y="430" width="6" height="120" rx="3" fill="#3b82f6"/>
  <text x="640" y="458" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">corollary</text>
  <text x="468" y="484" font-size="9.5" fill="#94a3b8">abstract</text>
  <text x="530" y="484" font-size="9" fill="#1e40af">"The Renyi mass spectrum has linear slope</text>
  <text x="530" y="497" font-size="9" fill="#1e40af">(q-1) log(phi) in order q."</text>
  <text x="468" y="522" font-size="9.5" fill="#94a3b8">body</text>
  <text x="530" y="522" font-size="9" fill="#1e40af">"Hence h_q = (q-1) log(phi)."</text>
  <text x="468" y="544" font-size="7.5" fill="#cbd5e1">6585b026-de65-40b9-bf92-a1aea4fcce47</text>

