  <!-- TeX block -->
  <rect x="50" y="232" width="275" height="270" rx="8" fill="#fef2f2"/>
  <text x="62" y="252" font-size="8" fill="#991b1b" font-family="'SF Mono', monospace">% auto-generated atom</text>
  <text x="62" y="266" font-size="8" fill="#991b1b" font-family="'SF Mono', monospace">% source: /Users/.../auric-</text>
  <text x="62" y="280" font-size="8" fill="#991b1b" font-family="'SF Mono', monospace">%   golden-phi/2026_golden_...</text>
  <text x="62" y="294" font-size="8" fill="#991b1b" font-family="'SF Mono', monospace">\phantomsection</text>
  <text x="62" y="308" font-size="8" fill="#991b1b" font-family="'SF Mono', monospace">\label{kgid:3b790d51a4a7}</text>
  <text x="62" y="322" font-size="8" fill="#991b1b" font-family="'SF Mono', monospace">\begin{theorem}[bin-fold</text>
  <text x="62" y="336" font-size="8" fill="#991b1b" font-family="'SF Mono', monospace">  输出分布的 Renyi 质量谱仿射律]</text>
  <text x="62" y="350" font-size="8" fill="#991b1b" font-family="'SF Mono', monospace">令 \(\pi_m(w):=d_m^{\mathrm</text>
  <text x="62" y="364" font-size="8" fill="#991b1b" font-family="'SF Mono', monospace">  {bin}}(w)/2^m\) 为 bin-fold</text>
  <text x="62" y="378" font-size="8" fill="#991b1b" font-family="'SF Mono', monospace">  在均匀微态输入下诱导的输出分布</text>

  <text x="155" y="404" text-anchor="middle" font-size="16" fill="#d1d5db" letter-spacing="6">· · · · ·</text>

  <text x="62" y="428" font-size="8" fill="#991b1b" font-family="'SF Mono', monospace">=(q-1)\log\varphi.</text>
  <text x="62" y="442" font-size="8" fill="#991b1b" font-family="'SF Mono', monospace">\end{theorem}</text>

  <text x="62" y="464" font-size="8" fill="#e87933" font-style="italic">Mixed: Chinese + English + LaTeX</text>
  <text x="62" y="478" font-size="8" fill="#e87933" font-style="italic">Multiple concepts in one block</text>

